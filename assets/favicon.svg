<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a24e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <!-- Neck -->
  <rect x="29" y="2" width="6" height="30" rx="1" fill="url(#g)"/>
  <!-- Frets -->
  <line x1="29" y1="10" x2="35" y2="10" stroke="#5a3e0a" stroke-width="0.8"/>
  <line x1="29" y1="16" x2="35" y2="16" stroke="#5a3e0a" stroke-width="0.8"/>
  <line x1="29" y1="22" x2="35" y2="22" stroke="#5a3e0a" stroke-width="0.8"/>
  <!-- Headstock -->
  <rect x="27" y="1" width="10" height="6" rx="2" fill="#8b6914"/>
  <!-- Tuning pegs -->
  <circle cx="28" cy="3" r="1.2" fill="#c9a84c"/>
  <circle cx="28" cy="5.5" r="1.2" fill="#c9a84c"/>
  <circle cx="36" cy="3" r="1.2" fill="#c9a84c"/>
  <circle cx="36" cy="5.5" r="1.2" fill="#c9a84c"/>
  <!-- Body -->
  <ellipse cx="32" cy="44" rx="16" ry="18" fill="url(#g)"/>
  <ellipse cx="32" cy="44" rx="13" ry="15" fill="#6b4c11"/>
  <!-- Sound hole -->
  <circle cx="32" cy="44" r="5" fill="#2a1a00"/>
  <circle cx="32" cy="44" r="5.5" fill="none" stroke="#c9a84c" stroke-width="0.8"/>
  <!-- Bridge -->
  <rect x="28" y="52" width="8" height="2" rx="0.5" fill="#3d2a00"/>
  <!-- Strings -->
  <line x1="30" y1="7" x2="30" y2="52" stroke="#e8d5a0" stroke-width="0.5"/>
  <line x1="32" y1="7" x2="32" y2="52" stroke="#e8d5a0" stroke-width="0.5"/>
  <line x1="34" y1="7" x2="34" y2="52" stroke="#e8d5a0" stroke-width="0.5"/>
</svg>
